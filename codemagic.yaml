workflows:
  android-build:
    name: Build Android APK
    instance_type: mac_mini_m1
    max_build_duration: 10
    environment:
      android_signing:
        - keystore_reference
    scripts:
      - name: Build APK
        script: |
          cd app
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
